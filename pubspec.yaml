name: glowcart_final

description: Flutter final project - GlowCart cosmetics marketplace without Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  chopper: ^8.0.3
  json_annotation: ^4.9.0
  drift: ^2.22.1
  drift_flutter: ^0.2.2
  path_provider: ^2.1.5
  path: ^1.9.0
  sqlite3_flutter_libs: ^0.5.26
  firebase_core: ^3.1.1 
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
